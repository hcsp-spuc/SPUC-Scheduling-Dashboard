<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Videos Management</title>
    <link rel="stylesheet" href="/Styles/AdminVideos.css">
</head>

<body>
    <!-- Header -->
    <header class="admin-header">
        <div class="header-white">
            <div class="header-content">
                <div class="header-left">
                    <img src="../Assets/HCLogo.png" alt="Hope Channel Logo" class="hc-logo">
                    <div class="header-text">
                        <p class="welcome-text">WELCOME TO</p>
                        <h1 class="channel-name">Hope Channel</h1>
                        <p class="subtitle-text">SOUTHWESTERN PHILIPPINES</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="header-yellow"></div>
        <div class="header-blue">
            <div class="header-right">
                <p class="admin-label">EVENT SCHEDULING</p>
                <h2 class="admin-title">ADMIN INTERFACE</h2>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="admin-profile">
                <img src="../Assets/admin-icon.png" alt="Admin" class="admin-icon-img">
                <p class="admin-text">ADMIN</p>
            </div>
            <nav class="sidebar-menu">
                <a href="/Page/AdminDashboard.html" class="menu-item">
                    <img src="../Assets/event-icon.png" alt="Event" class="menu-icon-img">
                    <span class="menu-text">EVENT MANAGEMENT</span>
                </a>
                <a href="/Page/AdminVideos.html" class="menu-item active">
                    <img src="../Assets/video-icon.png" alt="Videos" class="menu-icon-img">
                    <span class="menu-text">VIDEOS MANAGEMENT</span>
                </a>
                <a href="/Page/AdminImages.html" class="menu-item">
                    <img src="../Assets/images-icon.png" alt="Photos" class="menu-icon-img">
                    <span class="menu-text">PHOTOS MANAGEMENT</span>
                </a>
                <a href="/Page/AdminProfile.html" class="menu-item">
                    <img src="../Assets/profile.png" alt="Profile" class="menu-icon-img">
                    <span class="menu-text">PROFILE</span>
                </a>
            </nav>
            <a href="#" class="menu-item sign-out">
                <img src="../Assets/signout.png" alt="Sign Out" class="menu-icon-img">
                <span class="menu-text">SIGN OUT</span>
            </a>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-header">
                <h2>MANAGE VIDEO DISPLAYS</h2>
                <div class="header-line"></div>
            </div>

            <!-- Add Video Form -->
            <div class="form-card">
                <h3 class="form-title">Add Video to Display</h3>
                <div class="form-group">
                    <label class="form-label">TITLE :</label>
                    <input type="text" class="form-input" placeholder="Youtube Video Title">
                </div>
                <div class="form-group">
                    <label class="form-label">URL :</label>
                    <input type="text" class="form-input" placeholder="Youtube Video URL Link">
                </div>
                <div class="form-group">
                    <label class="form-label">DURATION:</label>
                    <div class="duration-dropdown-wrapper">
                        <button type="button" class="duration-dropdown-btn" id="durationBtn">Select Duration</button>
                        <div class="duration-dropdown-menu" id="durationMenu">
                            <button type="button" class="duration-option" data-value="30s">30 seconds</button>
                            <button type="button" class="duration-option" data-value="1m">1 minute</button>
                            <button type="button" class="duration-option" data-value="5m">5 minutes</button>
                            <button type="button" class="duration-option" data-value="10m">10 minutes</button>
                            <button type="button" class="duration-option" data-value="original">Original Duration</button>
                            <div class="duration-divider"></div>
                            <div class="custom-duration-input-wrapper">
                                <input type="text" id="customDurationInput" class="custom-duration-input" placeholder="e.g., 2m, 30s, 1h">
                                <button type="button" class="custom-duration-apply" id="applyCustomDuration">Apply</button>
                            </div>
                        </div>
                        <input type="hidden" id="selectedDuration" value="">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-add">ADD VIDEO</button>
                    <button type="button" class="btn-cancel">CANCEL</button>
                </div>
            </div>

            <!-- Videos on Display -->
            <h3 class="section-title">Videos Currently on Display</h3>
            <div class="video-grid" id="videoGrid">
                <!-- Video cards populated here -->
            </div>
        </main>
    </div>

<script type="module" src="/Script/AdminVideos.js"></script>
</body>

</html>
