<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Images Management</title>
    <link rel="icon" type="image/png" href="../Assets/HCLogo.png">
    <link rel="stylesheet" href="/Styles/AdminImage.css">
    <link rel="stylesheet" href="/Styles/modal.css">
</head>

<body>
    <!-- Header -->
    <header class="admin-header">
        <div class="header-white">
            <div class="header-content">
                <div class="header-left">
                    <img src="../Assets/HCLogo.png" alt="Hope Channel Logo" class="hc-logo">
                    <div class="header-text">
                        <p class="welcome-text">WELCOME TO</p>
                        <h1 class="channel-name">Hope Channel</h1>
                        <p class="subtitle-text">SOUTHWESTERN PHILIPPINES</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="header-yellow"></div>
        <div class="header-blue">
            <div class="header-right">
                <p class="admin-label">EVENT SCHEDULING</p>
                <h2 class="admin-title">ADMIN INTERFACE</h2>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="admin-profile">
                <img src="../Assets/admin-icon.png" alt="Admin" class="admin-icon-img">
                <p class="admin-text">ADMIN</p>
            </div>
            <nav class="sidebar-menu">
                <a href="/Page/AdminDashboard.html" class="menu-item">
                    <img src="../Assets/event-icon.png" alt="Event" class="menu-icon-img">
                    <span class="menu-text">EVENT MANAGEMENT</span>
                </a>
                <a href="/Page/AdminVideos.html" class="menu-item">
                    <img src="../Assets/video-icon.png" alt="Videos" class="menu-icon-img">
                    <span class="menu-text">VIDEOS MANAGEMENT</span>
                </a>
                <a href="/Page/AdminImages.html" class="menu-item active">
                    <img src="../Assets/images-icon.png" alt="Photos" class="menu-icon-img">
                    <span class="menu-text">PHOTOS MANAGEMENT</span>
                </a>
                <a href="/Page/AdminProfile.html" class="menu-item">
                    <img src="../Assets/profile.png" alt="Profile" class="menu-icon-img">
                    <span class="menu-text">PROFILE</span>
                </a>
            </nav>
            <button class="menu-item refresh-display-btn" onclick="refreshDisplay()" title="Refresh display screen">
                <span style="font-size:18px;">&#x21BB;</span>
                <span class="menu-text">REFRESH DISPLAY</span>
            </button>
            <a href="#" class="menu-item sign-out">
                <img src="../Assets/signout.png" alt="Sign Out" class="menu-icon-img">
                <span class="menu-text">SIGN OUT</span>
            </a>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-header">
                <h2>MANAGE IMAGE LOOP DISPLAYS</h2>
                <div class="header-line"></div>
            </div>

            <!-- Add Image Form -->
            <div class="form-card">
                <h3 class="form-title">Add Image to Display in the Loop</h3>
                <div class="form-group">
                    <label class="form-label">Image File</label>
                    <input type="file" id="imageFileInput" class="form-input-file" accept="image/*">
                </div>
                <div class="form-actions">
                    <button class="btn-add" id="btnAdd">ADD IMAGE</button>
                    <button class="btn-cancel" id="btnCancel">CANCEL</button>
                </div>
            </div>

            <!-- Images on Display -->
            <h3 class="section-title">Images Currently on Display</h3>
            <div class="image-grid" id="imageGrid">
                <!-- Image cards populated here -->
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-header" id="modalHeader">
                <span id="modalTitle">NOTICE</span>
            </div>
            <div class="modal-body">
                <p id="modalMessage"></p>
            </div>
            <div class="modal-footer">
                <button class="modal-btn-cancel" id="modalCancelBtn" style="display:none;">CANCEL</button>
                <button class="modal-btn" id="modalOkBtn">OK</button>
            </div>
        </div>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const _app = initializeApp({ apiKey: "AIzaSyB32ggdpwiNyZ0BKXeqwhVG7_Ei2qLF-Pw", authDomain: "hcsp-scheduling-system.firebaseapp.com", projectId: "hcsp-scheduling-system", storageBucket: "hcsp-scheduling-system.firebasestorage.app", messagingSenderId: "498610158944", appId: "1:498610158944:web:d4c6778a849016e12c7205" });
const _db = getFirestore(_app);
window.refreshDisplay = () => setDoc(doc(_db, 'system', 'refresh'), { trigger: Date.now() });
</script>
<script src="/Script/adminAuth.js"></script>
<script type="module" src="/Script/AdminImages.js"></script>
</body>

</html>
