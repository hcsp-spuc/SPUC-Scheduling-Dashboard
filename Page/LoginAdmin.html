<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link rel="icon" type="image/png" href="../Assets/HCLogo.png">

<link rel="stylesheet" href="../Styles/LoginAdmin.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<div class="login-container">

    <div class="logo-section">
        <div class="logo-circle">
            <i class="fas fa-shield-halved"></i>
        </div>

        <h2>Admin Portal</h2>
        <p class="subtitle">Secure Access Dashboard</p>
    </div>

    <form id="loginForm">

        <div class="input-group">
            <label><i class="fas fa-user"></i> Username</label>
            <input type="text" id="email" placeholder="Enter username" required>
        </div>

        <div class="input-group">
            <label><i class="fas fa-lock"></i> Password</label>

            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Enter your password" required>
                <i class="fas fa-eye toggle-password" id="togglePassword"></i>
            </div>

        </div>

        <div id="error" style="display:none;color:red;margin-bottom:10px;font-size:14px;"></div>

        <button type="submit" class="login-btn">
            <span>Sign In</span>
            <i class="fas fa-arrow-right"></i>
        </button>

    </form>

</div>


<script type="module" src="../Script/LoginAdmin.js"></script>

</body>
</html>
