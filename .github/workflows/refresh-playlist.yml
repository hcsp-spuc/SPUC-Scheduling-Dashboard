name: Daily Playlist Refresh

on:
  schedule:
    # 8:00 AM Asia/Manila (UTC+8) = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh playlist
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node refresh-playlist.js
