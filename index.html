<body>
<div class="scale-wrapper">

<div class="time-display-header">
<span class="time-label-header">TIME:</span>
<span class="current-time-header" id="currentTime"></span>
</div>

<main class="main-container">

<div class="content-layout">

<section class="list-container">

<div class="schedule-header">
<p class="subtitle">TODAY'S SCHEDULE</p>
<h1 class="date-display" id="todayDate">
<span class="day-highlight">MONDAY</span> MARCH 9, 2026
</h1>
</div>

</section>

<aside class="preview-area">

<!-- IMAGE CAROUSEL -->
<div class="image-box">
<img id="carouselImageA" src="" alt="Carousel">
<img id="carouselImageB" src="" alt="Carousel">
</div>

<!-- VIDEO -->
<div class="video-box">
<iframe 
id="youtubeVideo"
frameborder="0"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"

<script>

/* CLOCK */

function updateTime(){
const now = new Date();

const hours = now.getHours();
const minutes = now.getMinutes().toString().padStart(2,'0');
const seconds = now.getSeconds().toString().padStart(2,'0');

const ampm = hours >= 12 ? 'PM' : 'AM';
const displayHours = hours % 12 || 12;

document.getElementById('currentTime').textContent =
`${displayHours}:${minutes}:${seconds} ${ampm}`;
}

updateTime();
setInterval(updateTime,1000);


/* TODAY HEADER DATE */

const today = new Date();

const days = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
const months = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];

const dayName = days[today.getDay()];
const monthName = months[today.getMonth()];
const dateNumber = today.getDate();
const year = today.getFullYear();

document.getElementById("todayDate").innerHTML =
`<span class="day-highlight">${dayName}</span> ${monthName} ${dateNumber}, ${year}`;

</script>

<!-- FIREBASE EVENTS -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyB32ggdpwiNyZ0BKXeqwhVG7_Ei2qLF-Pw",
authDomain: "hcsp-scheduling-system.firebaseapp.com",
projectId: "hcsp-scheduling-system",
storageBucket: "hcsp-scheduling-system.firebasestorage.app",
messagingSenderId: "498610158944",
appId: "1:498610158944:web:d4c6778a849016e12c7205",
measurementId: "G-GFNQXDK1LE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* convert time to minutes */

function convertToMinutes(timeString) {
    const isPM = timeString.toUpperCase().includes('PM');
    const isAM = timeString.toUpperCase().includes('AM');
    
    let cleanTime = timeString.replace(/(AM|PM)/i, '').trim();
    let [h, m] = cleanTime.split(':');
    
    h = parseInt(h);
    m = m ? parseInt(m) : 0;

    if (isPM && h !== 12) h += 12;
    if (isAM && h === 12) h = 0;

    return h * 60 + m;
}

function parseEventTimes(timeStr) {
    let [startStr, endStr] = timeStr.split('-').map(s => s.trim());
    const endMinutes = convertToMinutes(endStr);
    if (!startStr.includes('PM') && !startStr.includes('AM')) {
        const endIsPM = endStr.toUpperCase().includes('PM');
        const startHour = parseInt(startStr.split(':')[0]);
        const endHour = parseInt(endStr.replace(/(AM|PM)/i, '').split(':')[0]);
        // start is AM if: end is not PM, or start hour >= end hour (crosses noon), or end hour is 12 (noon)
        if (!endIsPM || startHour >= endHour || endHour === 12) {
            startStr += 'AM';
        } else {
            startStr += 'PM';
        }
    }
    return { startMinutes: convertToMinutes(startStr), endMinutes };
}


async function loadTodayEvents() {
    const container = document.querySelector(".list-container");

    // Fade out existing rows
    const existingRows = container.querySelectorAll('.schedule-row');
    if (existingRows.length > 0) {
        existingRows.forEach(row => { row.style.transition = 'opacity 0.3s ease'; row.style.opacity = '0'; });
        await new Promise(resolve => setTimeout(resolve, 320));
    }

    // Show spinning logo while fetching
    const dayHighlight = document.querySelector('.day-highlight');
    const todayDateEl = document.getElementById('todayDate');
    const headerHTML = `
        <div class="schedule-header">
            <p class="subtitle">TODAY'S SCHEDULE</p>
            <h1 class="date-display" id="todayDate">
                <span class="day-highlight">${dayHighlight ? dayHighlight.textContent : ''}</span> 
                ${todayDateEl ? todayDateEl.innerText.split(' ').slice(1).join(' ') : ''}
            </h1>
        </div>
        <div class="schedule-loading">
            <img src="Assets/HCLogo.png" alt="Loading">
            <span>Refreshing</span>
        </div>`;
    container.innerHTML = headerHTML;

    const today = new Date().toDateString();
    const snapshot = await getDocs(collection(db, "events"));

    let eventsArray = [];
    snapshot.forEach(doc => {
        const data = doc.data();
        if (data.date === today) eventsArray.push(data);
    });

    eventsArray.sort((a, b) => {
        const { startMinutes: startA } = parseEventTimes(a.time);
        const { startMinutes: startB } = parseEventTimes(b.time);
        return startA - startB;
    });

    let isSplitDay = eventsArray.length > 4;
    let isPM = false;

    if (isSplitDay) {
        const now = new Date();
        const currentMinutes = now.getHours() * 60 + now.getMinutes();
        isPM = currentMinutes >= 12 * 60 + 1;
        eventsArray = eventsArray.filter(data => {
            const { startMinutes } = parseEventTimes(data.time);
            return isPM ? startMinutes >= 12 * 60 : startMinutes < 12 * 60;
        });
    }

    const switchOccurred = isSplitDay && lastIsPM !== null && lastIsPM !== isPM;
    if (isSplitDay) lastIsPM = isPM;

    if (switchOccurred) {
        container.classList.add('period-switch-out');
        await new Promise(resolve => setTimeout(resolve, 500));
        container.classList.remove('period-switch-out');
        container.classList.add('period-switch-in');
        setTimeout(() => container.classList.remove('period-switch-in'), 600);
    }

    // Remove loading spinner
    const loadingEl = container.querySelector('.schedule-loading');
    if (loadingEl) loadingEl.remove();

    if(eventsArray.length === 0) {
        const noEvents = document.createElement("div");
        noEvents.className = "schedule-row";
        noEvents.innerHTML = `
            <span class="time-range">--:--</span>
            <span class="program-name">No events scheduled for today</span>
        `;
        container.appendChild(noEvents);
    } else {
            eventsArray.forEach((data, i) => {
            const { startMinutes, endMinutes } = parseEventTimes(data.time);
            const now = new Date();
            const currentMinutes = now.getHours() * 60 + now.getMinutes();

            let badge = "";
            if (currentMinutes >= startMinutes && currentMinutes <= endMinutes) {
                badge = `<div class="ongoing-badge">ON-GOING</div>`;
            }

            const row = document.createElement("div");
            row.className = "schedule-row row-enter" + (currentMinutes > endMinutes ? " done" : "");
            row.style.animationDelay = `${i * 80}ms`;
            row.innerHTML = `
                <span class="time-range">${data.time}</span>
                <div class="program-info">
                    <span class="program-name">${data.programName || 'UNDEFINED'}</span>
                    ${data.description ? `<span class="program-description">${data.description}</span>` : ''}
                </div>
                ${badge}
            `;
            container.appendChild(row);
        });
    }

    container.classList.toggle('compact', eventsArray.length >= 5);
}

let lastIsPM = null;

loadTodayEvents();

setInterval(()=>{ loadTodayEvents(); }, 60 * 1000);

// VIDEO DISPLAY ROTATION

let currentVideoIndex = 0;
let videoList = [];
let videoTimer = null;
let isSwapped = false;
let isPlaying = false;
let activeLiveId = null;
let ytPlayer = null;
let ytPlayerReady = false;
let pendingOnEnd = null;

function getVideoId(url) {
    const regExp = /(?:youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|\/live\/)([^#\&\?]{11})/;
    const match = url.match(regExp);
    return match ? match[1] : null;
}

// Load YouTube IFrame API
const ytScript = document.createElement('script');
ytScript.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(ytScript);

window.onYouTubeIframeAPIReady = function() {
    ytPlayerReady = true;
    if (pendingOnEnd) {
        const { videoId, muted, onEnd } = pendingOnEnd;
        pendingOnEnd = null;
        createYTPlayer(videoId, muted, onEnd);
    }
};

function parseDuration(durationStr) {
    if (!durationStr || durationStr === 'original') return null;
    const match = durationStr.match(/(\d+)([smh])/i);
    if (!match) return null;
    const value = parseInt(match[1]);
    const unit = match[2].toLowerCase();
    switch(unit) {
        case 's': return value * 1000;
        case 'm': return value * 60 * 1000;
        case 'h': return value * 60 * 60 * 1000;
        default:  return null;
    }
}

function createYTPlayer(videoId, muted, onEnd) {
    const videoBox = document.querySelector('.video-box');
    videoBox.innerHTML = '<div id="yt-player-el"></div>';
    if (ytPlayer) { try { ytPlayer.destroy(); } catch(e) {} }
    ytPlayer = new YT.Player('yt-player-el', {
        width: '100%',
        height: '100%',
        videoId,
        playerVars: { autoplay: 1, mute: muted ? 1 : 0, controls: 1, origin: location.origin },
        events: {
            onStateChange: (e) => {
                if (e.data === YT.PlayerState.ENDED) onEnd();
            }
        }
    });
}

function renderVideo(videoId, muted, onEnd, duration) {
    clearTimeout(videoTimer);
    const ms = parseDuration(duration);
    if (ytPlayerReady) {
        createYTPlayer(videoId, muted, onEnd);
    } else {
        pendingOnEnd = { videoId, muted, onEnd };
    }
    if (ms !== null) videoTimer = setTimeout(onEnd, ms);
}

// Step 1: Play video in normal (small) mode. When duration ends (or video ends if original) -> enter swap with next video.
function playNormal(index) {
    if (videoList.length === 0) return;
    currentVideoIndex = index % videoList.length;
    const video = videoList[currentVideoIndex];
    const videoId = getVideoId(video.url);
    if (!videoId) { playNormal(currentVideoIndex + 1); return; }
    let fired = false;
    const onEnd = () => { if (fired) return; fired = true; clearTimeout(videoTimer); enterSwap(currentVideoIndex + 1); };
    renderVideo(videoId, false, onEnd, video.duration);
}

// Step 2: Swap layout and play the given index. When duration ends -> play next in swap, or exit if no more live videos.
function enterSwap(nextIndex) {
    const contentLayout = document.querySelector('.content-layout');
    const listContainer = document.querySelector('.list-container');
    const previewArea = document.querySelector('.preview-area');
    const videoBox = document.querySelector('.video-box');

    if (!isSwapped) {
        isSwapped = true;
        contentLayout.insertBefore(videoBox, listContainer);
        videoBox.classList.add('swapped');
        previewArea.appendChild(listContainer);
        listContainer.classList.add('swapped');
    }

    currentVideoIndex = nextIndex % videoList.length;
    const video = videoList[currentVideoIndex];
    const videoId = getVideoId(video.url);
    if (!videoId) { enterSwap(currentVideoIndex + 1); return; }

    const isLive = !!video.isLive;
    let fired = false;
    const onEnd = isLive
        ? () => {
            if (fired) return; fired = true; clearTimeout(videoTimer);
            const nextIdx = (currentVideoIndex + 1) % videoList.length;
            if (videoList[nextIdx] && videoList[nextIdx].isLive) {
                enterSwap(nextIdx);
            } else {
                exitSwap();
            }
        }
        : () => { if (fired) return; fired = true; clearTimeout(videoTimer); exitSwap(); };

    renderVideo(videoId, false, onEnd, isLive ? null : video.duration);
}

// Step 3: Restore layout and play next video in normal mode.
function exitSwap() {
    const contentLayout = document.querySelector('.content-layout');
    const listContainer = document.querySelector('.list-container');
    const previewArea = document.querySelector('.preview-area');
    const videoBox = document.querySelector('.video-box');

    videoBox.classList.add('swap-out');
    listContainer.classList.add('swap-out');

    setTimeout(() => {
        contentLayout.insertBefore(listContainer, previewArea);
        listContainer.classList.remove('swapped', 'swap-out');
        isSwapped = false;
        previewArea.appendChild(videoBox);
        videoBox.classList.remove('swapped', 'swap-out');
        playNormal(currentVideoIndex + 1);
    }, 400);
}

async function loadVideosForDisplay() {
    try {
        const snapshot = await getDocs(collection(db, "videos"));
        const newList = [];
        snapshot.forEach(doc => { newList.push(doc.data()); });

        const liveVideos = newList.filter(v => v.isLive).sort((a, b) => (a.order ?? Infinity) - (b.order ?? Infinity));
        const regularVideos = newList.filter(v => !v.isLive).sort((a, b) => (a.order ?? Infinity) - (b.order ?? Infinity));
        const newLiveId = liveVideos.length > 0 ? getVideoId(liveVideos[0].url) : null;

        // New live video detected — interrupt and prioritize it in swapped mode
        if (newLiveId && newLiveId !== activeLiveId) {
            activeLiveId = newLiveId;
            videoList = [...liveVideos, ...regularVideos];
            clearTimeout(videoTimer);
            isPlaying = true;
            currentVideoIndex = -1;
            if (ytPlayer) { try { ytPlayer.destroy(); } catch(e) {} ytPlayer = null; }
            enterSwap(0);
            return;
        }

        if (!newLiveId) activeLiveId = null;
        videoList = [...liveVideos, ...regularVideos];

        // Start playback only on first load
        if (!isPlaying && videoList.length > 0) {
            isPlaying = true;
            playNormal(0);
        }
    } catch (error) {
        console.error('Error loading videos:', error);
    }
}

loadVideosForDisplay();
setInterval(loadVideosForDisplay, 3 * 60 * 1000);

// IMAGE CAROUSEL

let imageList = [];
let currentImageIndex = 0;
let imageTimer = null;
let activeSlot = 'B';

function showImage(index) {
    if (imageList.length === 0) return;
    currentImageIndex = index % imageList.length;

    const imgA = document.getElementById('carouselImageA');
    const imgB = document.getElementById('carouselImageB');
    const incoming = activeSlot === 'A' ? imgB : imgA;
    const outgoing = activeSlot === 'A' ? imgA : imgB;

    const nextUrl = imageList[currentImageIndex].url;
    const preload = new Image();
    preload.onload = () => {
        incoming.src = nextUrl;
        incoming.className = 'slide-in';
        outgoing.className = 'slide-out';
        activeSlot = activeSlot === 'A' ? 'B' : 'A';
    };
    preload.src = nextUrl;

    imageTimer = setTimeout(() => showImage(currentImageIndex + 1), 5000);
}

async function loadImagesForDisplay() {
    try {
        const snapshot = await getDocs(collection(db, "images"));
        imageList = [];
        snapshot.forEach(doc => { imageList.push(doc.data()); });
        clearTimeout(imageTimer);
        if (imageList.length > 0) showImage(0);
    } catch (error) {
        console.error('Error loading images:', error);
    }
}

loadImagesForDisplay();
setInterval(loadImagesForDisplay, 5 * 60 * 1000);


</script>

</div>
</body>
