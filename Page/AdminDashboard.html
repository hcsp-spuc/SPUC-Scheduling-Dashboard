<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Events Management</title>
    <link rel="stylesheet" href="../Styles/AdminDashboard.css">
</head>
<body>
    <!-- Header -->
    <header class="admin-header">
        <div class="header-white">
            <div class="header-content">
                <div class="header-left">
                    <img src="../Assets/HCLogo.png" alt="Hope Channel Logo" class="hc-logo">
                    <div class="header-text">
                        <p class="welcome-text">WELCOME TO</p>
                        <h1 class="channel-name">Hope Channel</h1>
                        <p class="subtitle-text">SOUTHWESTERN PHILIPPINES</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="header-yellow"></div>
        <div class="header-blue">
            <div class="header-right">
                <p class="admin-label">EVENT SCHEDULING</p>
                <h2 class="admin-title">ADMIN INTERFACE</h2>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="admin-profile">
                <img src="../Assets/admin-icon.png" alt="Admin" class="admin-icon-img">
                <p class="admin-text">ADMIN</p>
            </div>
            <nav class="sidebar-menu">
                <a href="/Page/AdminDashboard.html" class="menu-item active">
                    <img src="../Assets/event-icon.png" alt="Event" class="menu-icon-img">
                    <span class="menu-text">EVENT MANAGEMENT</span>
                </a>
                <a href="/Page/AdminVideos.html" class="menu-item">
                    <img src="../Assets/video-icon.png" alt="Videos" class="menu-icon-img">
                    <span class="menu-text">VIDEOS MANAGEMENT</span>
                </a>
                <a href="/Page/AdminImages.html" class="menu-item">
                    <img src="../Assets/images-icon.png" alt="Photos" class="menu-icon-img">
                    <span class="menu-text">PHOTOS MANAGEMENT</span>
                </a>
                <a href="/Page/AdminProfile.html" class="menu-item">
                    <img src="../Assets/profile.png" alt="Profile" class="menu-icon-img">
                    <span class="menu-text">PROFILE</span>
                </a>
            </nav>
            <a href="#" class="menu-item sign-out">
                <img src="../Assets/signout.png" alt="Sign Out" class="menu-icon-img">
                <span class="menu-text">SIGN OUT</span>
            </a>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-header">
                <h2>MANAGE EVENTS/ PROGRAMS SCHEDULE</h2>
                <div class="header-line"></div>
            </div>

            <div class="calendar-section">
                <!-- Month Navigation -->
                <div class="month-nav">
                    <span class="month-label">January</span>
                    <span class="month-label">February</span>
                    <button class="nav-btn prev">&lt;</button>
                    <h3 class="current-month" id="currentMonth">MARCH 2026</h3>
                    <button class="nav-btn next">&gt;</button>
                    <span class="month-label">April</span>
                    <span class="month-label">May</span>
                </div>

                <!-- Calendar Grid -->
                <div class="calendar-grid">
                    <div class="weekdays">
                        <div class="weekday">SUN</div>
                        <div class="weekday">MON</div>
                        <div class="weekday">TUES</div>
                        <div class="weekday">WED</div>
                        <div class="weekday">THU</div>
                        <div class="weekday">FRI</div>
                        <div class="weekday">SAT</div>
                    </div>
                    <div class="dates" id="calendarDates"></div>
                </div>
            </div>

            <!-- Event Form -->
            <div class="event-form-section">
                <div class="form-header">
                    <span class="form-date" id="selectedDate">THU MARCH 12, 2026</span>
                </div>
                <form class="event-form" id="eventForm">
                    <div class="form-group">
                        <label for="timeSlot">SELECT TIME</label>
                        <div class="time-slot-container">
                            <select id="timeSlot" class="form-control" required>
                                <option value="">Choose time slot</option>
                            </select>
                            <input type="text" id="customTimeInput" class="form-control custom-time-input" placeholder="Enter custom time (e.g., 9:00 - 10:00 AM)" style="display: none;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="program">SELECT PROGRAM</label>
                        <div class="program-slot-container">
                            <select id="program" class="form-control" required>
                                <option value="">Choose the program</option>
                            </select>
                            <input type="text" id="customProgramInput" class="form-control custom-program-input" placeholder="Enter custom program" style="display: none;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="description">DESCRIPTION</label>
                        <input type="text" id="description" class="form-control" placeholder="Describe the event (Optional)">
                    </div>
                    <button type="submit" class="btn-submit">ADD TO SCHEDULE</button>
                </form>
            </div>
        </main>
    </div>

    <script type="module" src="../Script/AdminDashboard.js"></script>
</body>
</html>
