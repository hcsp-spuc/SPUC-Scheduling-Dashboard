<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hope Channel South Philippines - Broadcast Schedule</title>
<link rel="stylesheet" href="Styles/index.css">
</head>

<body>

<header class="top-branding">
<div class="header-left">
<img src="Assets/HCLogo.png" alt="Hope Channel Logo" class="hc-logo">

<div class="header-text">
<p class="welcome-text">WELCOME TO</p>
<h1 class="channel-name">Hope Channel</h1>
<p class="subtitle-text">SOUTH PHILIPPINES</p>
</div>
</div>

<div class="header-right">
<div class="rectangle-yellow"></div>
<img src="Assets/SWPUC Territory.png" class="territory-info">
<img src="Assets/map.png" class="territory-map">
</div>

<div class="header-bottom"></div>
</header>

<div class="time-display-header">
<span class="time-label-header">TIME:</span>
<span class="current-time-header" id="currentTime"></span>
</div>

<main class="main-container">

<div class="content-layout">

<section class="list-container">

<div class="schedule-header">
<p class="subtitle">TODAY'S SCHEDULE</p>
<h1 class="date-display" id="todayDate">
<span class="day-highlight">MONDAY</span> MARCH 9, 2026
</h1>
</div>

</section>

<aside class="preview-area">

<!-- IMAGE CAROUSEL -->

<div class="image-box">
<img id="carouselImage" src="" alt="Carousel">
</div>

<!-- VIDEO -->

<div class="video-box">
<iframe 
id="youtubeVideo"
frameborder="0"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>
</iframe>
</div>

</aside>

</div>
</main>

<script>

/* CLOCK */

function updateTime(){
const now = new Date();

const hours = now.getHours();
const minutes = now.getMinutes().toString().padStart(2,'0');
const seconds = now.getSeconds().toString().padStart(2,'0');

const ampm = hours >= 12 ? 'PM' : 'AM';
const displayHours = hours % 12 || 12;

document.getElementById('currentTime').textContent =
`${displayHours}:${minutes}:${seconds} ${ampm}`;
}

updateTime();
setInterval(updateTime,1000);


/* TODAY HEADER DATE */

const today = new Date();

const days = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
const months = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];

const dayName = days[today.getDay()];
const monthName = months[today.getMonth()];
const dateNumber = today.getDate();
const year = today.getFullYear();

document.getElementById("todayDate").innerHTML =
`<span class="day-highlight">${dayName}</span> ${monthName} ${dateNumber}, ${year}`;




</script>

<!-- FIREBASE EVENTS -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDzSCJ8XellJRvOSBZ7cTCA2OcmFh8jSrs",
authDomain: "spuc-events-web.firebaseapp.com",
projectId: "spuc-events-web",
storageBucket: "spuc-events-web.firebasestorage.app",
messagingSenderId: "989356465487",
appId: "1:989356465487:web:428b119629a939e725793a",
measurementId: "G-QE1HPE63EH"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* convert time to minutes */

function convertToMinutes(timeString) {
    const isPM = timeString.toUpperCase().includes('PM');
    const isAM = timeString.toUpperCase().includes('AM');
    
    let cleanTime = timeString.replace(/(AM|PM)/i, '').trim();
    let [h, m] = cleanTime.split(':');
    
    h = parseInt(h);
    m = m ? parseInt(m) : 0;

    // Convert to 24-hour format
    if (isPM && h !== 12) h += 12;
    if (isAM && h === 12) h = 0;

    return h * 60 + m;
}


async function loadTodayEvents() {
    const container = document.querySelector(".list-container");
    
    // Maintain the header so it doesn't get cleared
    const headerHTML = `
        <div class="schedule-header">
            <p class="subtitle">TODAY'S SCHEDULE</p>
            <h1 class="date-display" id="todayDate">
                <span class="day-highlight">${document.querySelector('.day-highlight').textContent}</span> 
                ${document.getElementById("todayDate").innerText.split(' ').slice(1).join(' ')}
            </h1>
        </div>`;
    container.innerHTML = headerHTML;
    
    const today = new Date().toDateString();
    const snapshot = await getDocs(collection(db, "events"));
    
    // 1. Fetch events and put them in an array
    let eventsArray = [];
    snapshot.forEach(doc => {
        const data = doc.data();
        if (new Date(data.date).toDateString() === today) {
            eventsArray.push(data);
        }
    });

    // 2. Sort the array by start time
    eventsArray.sort((a, b) => {
        let [startA, endA] = a.time.split('-');
        let [startB, endB] = b.time.split('-');
        
        // Add AM/PM to start time if missing
        if (!startA.includes('PM') && !startA.includes('AM')) {
            startA += endA.match(/(AM|PM)/i)[0];
        }
        if (!startB.includes('PM') && !startB.includes('AM')) {
            startB += endB.match(/(AM|PM)/i)[0];
        }
        
        return convertToMinutes(startA) - convertToMinutes(startB);
    });

    // 3. Render the sorted events
    if(eventsArray.length === 0) {
        const noEvents = document.createElement("div");
        noEvents.className = "schedule-row";
        noEvents.innerHTML = `
            <span class="time-range">--:--</span>
            <span class="program-name">No events scheduled for today</span>
        `;
        container.appendChild(noEvents);
    } else {
        eventsArray.forEach(data => {
            let [startStr, endStr] = data.time.split('-');
            if (!startStr.includes('PM') && !startStr.includes('AM')) {
                startStr += endStr.match(/(AM|PM)/i)[0];
            }

            const startMinutes = convertToMinutes(startStr);
            const endMinutes = convertToMinutes(endStr);
            const now = new Date();
            const currentMinutes = now.getHours() * 60 + now.getMinutes();

            let badge = "";
            if (currentMinutes >= startMinutes && currentMinutes <= endMinutes) {
                badge = `<div class="ongoing-badge">ON-GOING</div>`;
            }

            const row = document.createElement("div");
            row.className = "schedule-row";
            row.innerHTML = `
                <span class="time-range">${data.time}</span>
                <span class="program-name">${data.programName || 'UNDEFINED'}</span>
                ${badge}
            `;
            container.appendChild(row);
        });
    }
}

loadTodayEvents();

/* auto refresh every minute */

setInterval(()=>{
loadTodayEvents();
},60000);

// VIDEO DISPLAY ROTATION

let currentVideoIndex = 0;
let videoList = [];
let videoTimer = null;

function getVideoId(url) {
    const regExp = /(?:youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*)./;
    const match = url.match(regExp);
    return match ? match[1] : null;
}

function parseDuration(durationStr) {
    if (!durationStr) return 30000;
    
    const match = durationStr.match(/(\d+)([smh])/i);
    if (!match) return 30000;
    
    const value = parseInt(match[1]);
    const unit = match[2].toLowerCase();
    
    let ms = 0;
    switch(unit) {
        case 's': ms = value * 1000; break;
        case 'm': ms = value * 60 * 1000; break;
        case 'h': ms = value * 60 * 60 * 1000; break;
        default: ms = 30000;
    }
    
    console.log(`Parsed duration: ${durationStr} = ${ms}ms`);
    return ms;
}

function playVideo(index) {
    if (videoList.length === 0) {
        console.log('No videos in list');
        return;
    }
    
    currentVideoIndex = index % videoList.length;
    const video = videoList[currentVideoIndex];
    
    console.log(`Playing video ${currentVideoIndex}:`, video);
    
    const videoId = getVideoId(video.url);
    
    if (videoId) {
        const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0`;
        
        const videoBox = document.querySelector('.video-box');
        videoBox.innerHTML = '';
        
        const iframe = document.createElement('iframe');
        iframe.src = embedUrl;
        iframe.width = '100%';
        iframe.height = '100%';
        iframe.frameBorder = '0';
        iframe.allow = 'autoplay; encrypted-media';
        iframe.allowFullscreen = true;
        
        videoBox.appendChild(iframe);
        
        clearTimeout(videoTimer);
        const duration = parseDuration(video.duration);
        
        console.log(`Video will play for ${duration}ms before switching`);
        
        videoTimer = setTimeout(() => {
            console.log('Duration expired, playing next video');
            playVideo(currentVideoIndex + 1);
        }, duration);
    } else {
        console.log('Could not extract video ID from URL:', video.url);
    }
}

async function loadVideosForDisplay() {
    try {
        const snapshot = await getDocs(collection(db, "videos"));
        videoList = [];
        
        snapshot.forEach(doc => {
            const data = doc.data();
            console.log('Loaded video:', data);
            videoList.push(data);
        });
        
        console.log(`Total videos loaded: ${videoList.length}`);
        
        if (videoList.length > 0) {
            playVideo(0);
        }
    } catch (error) {
        console.error('Error loading videos:', error);
    }
}

loadVideosForDisplay();

setInterval(loadVideosForDisplay, 5 * 60 * 1000);

</script>

</body>
</html>
